        { t: "구하라 그리하면 너희에게 주실 것이요 찾으라 그리하면 찾아낼 것이요 문을 두드리라 그리하면 너희에게 열릴 것이니", r: "마태복음 7:7" },
        { t: "쉬지 말고 기도하라", r: "데살로니가전서 5:17" },

        { t: "너는 내게 부르짖으라 내가 네게 응답하겠고 네가 알지 못하는 크고 은밀한 일을 네게 보이리라", r: "예레미야 33:3" }
      ]},
      { cat: "관계·가정", icon: "🏠", title: "가정·자녀", verses: [
        { t: "만일 여호와를 섬기는 것이 너희에게 좋지 않게 보이거든 … 오직 나와 내 집은 여호와를 섬기겠노라", r: "여호수아 24:15" },
        { t: "마땅히 행할 길을 아이에게 가르치라 그리하면 늙어도 그것을 떠나지 아니하리라", r: "잠언 22:6" },
        { t: "보라 자식들은 여호와의 기업이요 태의 열매는 그의 상급이로다", r: "시편 127:3" },
        { t: "또 아비들아 너희 자녀를 노엽게 하지 말고 오직 주의 교훈과 훈계로 양육하라", r: "에베소서 6:4" },
        { t: "오늘 내가 네게 명하는 이 말씀을 너는 마음에 새기고 네 자녀에게 부지런히 가르치며 집에 앉았을 때에든지 길을 갈 때에든지 이 말씀을 강론할 것이며", r: "신명기 6:6-7" }
      ]},
      { cat: "사명·전도", icon: "🌍", title: "사명·전도", verses: [
        { t: "그러므로 너희는 가서 모든 민족을 제자로 삼아 아버지와 아들과 성령의 이름으로 세례를 베풀고", r: "마태복음 28:19" },
        { t: "또 이르시되 너희는 온 천하에 다니며 만민에게 복음을 전파하라", r: "마가복음 16:15" },
        { t: "오직 성령이 너희에게 임하시면 너희가 권능을 받고 예루살렘과 온 유대와 사마리아와 땅 끝까지 이르러 내 증인이 되리라", r: "사도행전 1:8" },
        { t: "그런즉 그들이 믿지 아니하는 이를 어찌 부르리요 … 전파하는 자가 없이 어찌 들으리요", r: "로마서 10:14" },
        { t: "이같이 너희 빛이 사람 앞에 비치게 하여 그들로 너희 착한 행실을 보고 하늘에 계신 너희 아버지께 영광을 돌리게 하라", r: "마태복음 5:16" }
      ]},

        { t: "그런즉 너희는 먼저 그의 나라와 그의 의를 구하라 그리하면 이 모든 것을 너희에게 더하시리라", r: "마태복음 6:33" },
        { t: "네 재물과 네 소산물의 처음 익은 열매로 여호와를 공경하라", r: "잠언 3:9" },
        { t: "각각 그 마음에 정한 대로 할 것이요 인색함으로나 억지로 하지 말지니 하나님은 즐겨 내는 자를 사랑하시느니라", r: "고린도후서 9:7" },
        { t: "나의 하나님이 그리스도 예수 안에서 영광 가운데 그 풍성한 대로 너희 모든 쓸 것을 채우시리라", r: "빌립보서 4:19" }
      ]}
    ];

    var grid = document.getElementById("topic-grid");
    var chipRow = document.getElementById("chip-row");
    var search = document.getElementById("topic-search");
    var noResult = document.getElementById("no-result");
    var toast = document.getElementById("toast");
    var toastTimer = null;

    var cats = ["전체"]; TOPICS.forEach(function (t) { if (cats.indexOf(t.cat) < 0) cats.push(t.cat); });
    var activeCat = "전체";

    cats.forEach(function (c) {
      var b = document.createElement("button");
      b.className = "chip" + (c === "전체" ? " active" : "");
      b.textContent = c;
      b.addEventListener("click", function () {
        activeCat = c;
        chipRow.querySelectorAll(".chip").forEach(function (x) { x.classList.remove("active"); });
        b.classList.add("active");
        render();
      });
      chipRow.appendChild(b);
    });

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function () { toast.classList.remove("show"); }, 1600);
    }

    function copyText(text, btn, okMsg) {
      function done() { showToast(okMsg || "복사되었습니다 ✓"); if (btn) { btn.classList.add("done"); btn.textContent = "✓"; setTimeout(function(){ btn.classList.remove("done"); btn.textContent = "⧉"; }, 1200); } }
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(done, function () { fallback(text); done(); });
      } else { fallback(text); done(); }
    }
    function fallback(text) {
      var ta = document.createElement("textarea");
      ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
      document.body.appendChild(ta); ta.select();
      try { document.execCommand("copy"); } catch (e) {}
      document.body.removeChild(ta);
    }

    function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

    function render() {
      var q = (search.value || "").trim().toLowerCase();
      grid.innerHTML = "";
      var shown = 0;
      TOPICS.forEach(function (topic) {
        if (activeCat !== "전체" && topic.cat !== activeCat) return;
        var verses = topic.verses;
        if (q) {
          var titleHit = (topic.title + " " + topic.cat).toLowerCase().indexOf(q) >= 0;
          if (!titleHit) {
            verses = topic.verses.filter(function (v) {
              return (v.t + " " + v.r).toLowerCase().indexOf(q) >= 0;
            });
            if (!verses.length) return;
          }
        }
        shown++;
        var card = document.createElement("div");
        card.className = "topic-card";
        var vhtml = verses.map(function (v) {
          return '<div class="tv"><span class="tv-text">“' + esc(v.t) + '”</span>' +
                 '<span class="tv-ref">' + esc(v.r) + '</span>' +
                 '<button class="copy" title="이 구절 복사" data-copy="' + esc(v.t) + ' (' + esc(v.r) + ')">⧉</button></div>';
        }).join("");
        card.innerHTML =
          '<div class="topic-card-head"><span class="ti">' + topic.icon + '</span>' +
          '<div><span class="cat">' + esc(topic.cat) + '</span><h3>' + esc(topic.title) + '</h3></div>' +
          '<button class="copyall" title="주제 전체 복사">전체 복사</button></div>' +
          '<div class="tv-list">' + vhtml + '</div>';
        // copy handlers
        card.querySelectorAll(".copy").forEach(function (btn) {
          btn.addEventListener("click", function () { copyText(btn.getAttribute("data-copy"), btn); });
        });
        card.querySelector(".copyall").addEventListener("click", function () {
          var all = "【" + topic.title + "】\n" + verses.map(function (v) { return "“" + v.t + "” (" + v.r + ")"; }).join("\n");
          copyText(all, null, topic.title + " 구절을 모두 복사했습니다 ✓");
        });
        grid.appendChild(card);
      });
      noResult.style.display = shown ? "none" : "block";
    }

    search.addEventListener("input", render);
    render();
  })();
  </script>
