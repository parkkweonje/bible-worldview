        n++;
        var d=document.createElement("div"); d.className="pcard";
        d.innerHTML='<span class="cat">'+esc(x.c)+'</span>'+
          '<div class="pcard-head"><h3>'+esc(x.n)+'</h3><span class="en">'+esc(x.e)+'</span></div>'+
          '<p class="role">'+esc(x.role)+'</p>'+
          '<p class="fact">'+esc(x.f)+'</p>'+
          '<blockquote class="pv">“'+esc(x.vt)+'”<cite>— '+esc(x.vr)+'</cite></blockquote>';
        grid.appendChild(d);
      });
      none.style.display=n?"none":"block";
    }
    search.addEventListener("input", render); render();
  })();
  </script>
</body>
</html>
